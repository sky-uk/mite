services:
  # Jaeger - All-in-one backend for trace storage and UI
  jaeger:
    image: jaegertracing/all-in-one:1.51
    container_name: mite-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - METRICS_STORAGE_TYPE=prometheus
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # Jaeger gRPC collector
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
    networks:
      - mite-otel

  # OpenTelemetry Collector (optional - for advanced scenarios)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.90.1
    container_name: mite-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4319:4317"   # OTLP gRPC (alternative port to avoid conflict)
      - "4320:4318"   # OTLP HTTP (alternative port to avoid conflict)
      - "8888:8888"   # Prometheus metrics from collector
      - "13133:13133" # Health check endpoint
    depends_on:
      - jaeger
    networks:
      - mite-otel
    profiles:
      - with-collector

  # Zipkin (alternative to Jaeger)
  zipkin:
    image: openzipkin/zipkin:2.24
    container_name: mite-zipkin
    ports:
      - "9411:9411"
    networks:
      - mite-otel
    profiles:
      - zipkin

networks:
  mite-otel:
    driver: bridge
